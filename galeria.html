<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midec26 — Galería</title>
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Oswald:wght@700;900&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    .font-display-fallback { font-family: 'Oswald', ui-sans-serif, system-ui, sans-serif; }
    .font-body-fallback { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
    .font-cursive-fallback { font-family: 'Dancing Script', ui-sans-serif, system-ui, sans-serif; }
  </style>
</head>
<body class="font-body-fallback">

  <main>

    <section class="bg-haze-grey py-32">
      <div class="max-w-7xl mx-auto px-6">
        <p class="font-cursive-fallback text-action-blue text-heading-sm mb-4">Visual</p>
        <h1 class="font-display-fallback text-[120px] md:text-[180px] leading-display font-black tracking-tighter text-sky-canvas/10">
          GALERÍA
        </h1>
      </div>
    </section>

    <section class="bg-cloud-white py-32">
      <div class="max-w-7xl mx-auto px-6">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <div class="card-image bg-gradient-to-br from-action-blue/20 to-sky-canvas/20 aspect-square flex items-center justify-center">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-action-blue)" stroke-width="1.5" class="opacity-40"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          </div>
          <div class="card-image bg-gradient-to-br from-sky-canvas/20 to-midnight-ink/20 aspect-square flex items-center justify-center">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-sky-canvas)" stroke-width="1.5" class="opacity-40"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          </div>
          <div class="card-image bg-gradient-to-br from-action-blue/20 to-cloud-white aspect-square flex items-center justify-center">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-action-blue)" stroke-width="1.5" class="opacity-40"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          </div>
          <div class="card-image bg-gradient-to-br from-midnight-ink/20 to-action-blue/20 aspect-square flex items-center justify-center md:col-span-2">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--color-midnight-ink)" stroke-width="1" class="opacity-30"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div class="card-image bg-gradient-to-br from-sky-canvas/20 to-haze-grey aspect-square flex items-center justify-center">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-sky-canvas)" stroke-width="1.5" class="opacity-40"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          </div>
        </div>
      </div>
    </section>

  </main>

  <script type="module">
    import { renderNav } from '/src/nav.js'
    import { renderFooter } from '/src/footer.js'
    renderNav('galeria')
    renderFooter()
  </script>

</body>
</html>
