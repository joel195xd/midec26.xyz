<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midec26 — Contacto</title>
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Oswald:wght@700;900&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    .font-display-fallback { font-family: 'Oswald', ui-sans-serif, system-ui, sans-serif; }
    .font-body-fallback { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
    .font-cursive-fallback { font-family: 'Dancing Script', ui-sans-serif, system-ui, sans-serif; }
  </style>
</head>
<body class="font-body-fallback">

  <main>

    <section class="bg-haze-grey py-32">
      <div class="max-w-7xl mx-auto px-6">
        <p class="font-cursive-fallback text-action-blue text-heading-sm mb-4">Conecta</p>
        <h1 class="font-display-fallback text-[120px] md:text-[180px] leading-display font-black tracking-tighter text-sky-canvas/10">
          CONTACTO
        </h1>
      </div>
    </section>

    <section class="bg-cloud-white py-32">
      <div class="max-w-7xl mx-auto px-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
          <div>
            <h2 class="font-display-fallback text-heading-lg leading-display font-black text-midnight-ink mb-8">
              Hablemos
            </h2>
            <p class="font-body-fallback text-body text-charcoal-text leading-body mb-12">
              ¿Colaboración, booking, o simplemente quieres decir algo? Estoy aquí.
            </p>
            <form class="space-y-6">
              <div>
                <label class="font-body-fallback text-caption font-semibold text-charcoal-text block mb-2">Nombre</label>
                <input type="text" class="input-field" placeholder="Tu nombre" />
              </div>
              <div>
                <label class="font-body-fallback text-caption font-semibold text-charcoal-text block mb-2">Correo</label>
                <input type="email" class="input-field" placeholder="tu@correo.com" />
              </div>
              <div>
                <label class="font-body-fallback text-caption font-semibold text-charcoal-text block mb-2">Mensaje</label>
                <textarea class="input-field min-h-[140px] resize-y" placeholder="Escribe tu mensaje..."></textarea>
              </div>
              <button type="submit" class="btn-outline">Enviar mensaje</button>
            </form>
          </div>
          <div>
            <h2 class="font-display-fallback text-heading-lg leading-display font-black text-midnight-ink mb-8">
              Redes
            </h2>
            <div class="space-y-6">
              <a href="#" class="flex items-center gap-4 group">
                <div class="w-12 h-12 rounded-radius-lg bg-haze-grey flex items-center justify-center group-hover:bg-action-blue/10 transition-colors">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="text-charcoal-text"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm-2 16.5v-9l6 4.5-6 4.5z"/></svg>
                </div>
                <div>
                  <p class="font-body-fallback font-semibold text-charcoal-text">Spotify</p>
                  <p class="font-body-fallback text-caption text-charcoal-text/60">Escucha mi música</p>
                </div>
              </a>
              <a href="#" class="flex items-center gap-4 group">
                <div class="w-12 h-12 rounded-radius-lg bg-haze-grey flex items-center justify-center group-hover:bg-action-blue/10 transition-colors">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-charcoal-text"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                </div>
                <div>
                  <p class="font-body-fallback font-semibold text-charcoal-text">Instagram</p>
                  <p class="font-body-fallback text-caption text-charcoal-text/60">Detrás de escena</p>
                </div>
              </a>
              <a href="#" class="flex items-center gap-4 group">
                <div class="w-12 h-12 rounded-radius-lg bg-haze-grey flex items-center justify-center group-hover:bg-action-blue/10 transition-colors">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="text-charcoal-text"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                </div>
                <div>
                  <p class="font-body-fallback font-semibold text-charcoal-text">YouTube</p>
                  <p class="font-body-fallback text-caption text-charcoal-text/60">Videos y visuales</p>
                </div>
              </a>
              <a href="#" class="flex items-center gap-4 group">
                <div class="w-12 h-12 rounded-radius-lg bg-haze-grey flex items-center justify-center group-hover:bg-action-blue/10 transition-colors">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="text-charcoal-text"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>
                </div>
                <div>
                  <p class="font-body-fallback font-semibold text-charcoal-text">TikTok</p>
                  <p class="font-body-fallback text-caption text-charcoal-text/60">Contenido exclusivo</p>
                </div>
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <script type="module">
    import { renderNav } from '/src/nav.js'
    import { renderFooter } from '/src/footer.js'
    renderNav('contacto')
    renderFooter()
  </script>

</body>
</html>
